<div id="productModal" class="modal-overlay">
  <div class="modal-panel" id="productModalContent"></div>
</div>
        <h2>${product.name}</h2>
        <p style="margin:10px 0;">Category: ${product.category}</p>
        <p style="font-size:1.5rem; font-weight:bold;">$${product.price.toLocaleString()}</p>

        <button id="addFromModal" style="margin-top:20px; padding:12px 20px;">
            🛍️ ADD TO CART
        </button>

        <button id="closeProductModal" style="margin-top:10px;">
            Close
        </button>
<div class="cart-bottom" id="cartIcon">
    <span>🛍️</span>
    <span class="cart-count" id="cartCounter">0</span>
</div>
        <h2>🎉 Order Confirmed</h2>
        <p>Your luxury items are on the way.</p>
        <p>Total Paid: $${totalPrice.toLocaleString()}</p>
        <button onclick="location.reload()">Continue Shopping</button>
